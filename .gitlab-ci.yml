variables:
  GIT_SUBMODULE_STRATEGY: recursive
  GIT_DEPTH: 1
  GIT_SUBMODULE_UPDATE_FLAGS: --jobs 4
  SECURE_LOG_LEVEL: "info"

stages:
  - pre_test
  - build_prod
  - build_dev
  - build_test
  - test
  - flash
  - release
  - build_diy
  - docker_build
  - security

image: blockstream/jade_builder@sha256:13692d96d78221de3a67d4bd4587c97c58bfa5eab16a9c72cb6d10529e1d3ebb

include:
  - gitlab/prod_fw.yml
  - gitlab/python.yml
  - gitlab/apidocs.yml
  - gitlab/test_fw.yml
  - gitlab/dev_fw.yml
  - gitlab/test_libjade.yml
  - gitlab/test.yml
  - gitlab/flash.yml
  - gitlab/release.yml
  - gitlab/diy_fw.yml
  - gitlab/docker.yml
  - gitlab/security.yml
  - template: Security/SAST.gitlab-ci.yml
  - template: Security/Secret-Detection.gitlab-ci.yml
  - template: Security/Dependency-Scanning.gitlab-ci.yml

#
# Jade FW build template
#

.build_template:
  tags: [ ga ]
  needs: []
  artifacts:
    expire_in: 2 weeks
    when: on_success
    paths:
    - $CI_JOB_NAME/jade.bin
    - $CI_JOB_NAME/*_fw.bin
    - $CI_JOB_NAME/*_fw.bin.hash
    - $CI_JOB_NAME/index.json
    - $CI_JOB_NAME/ota_data_initial.bin
    - $CI_JOB_NAME/bootloader/bootloader.bin
    - $CI_JOB_NAME/partition_table/partition-table.bin
    - $CI_JOB_NAME/sdkconfig*
    - $CI_JOB_NAME/bsdiff.*
  script:
    - pushd /opt/esp/idf && . ./export.sh && popd
    - idf.py all size-components size
    - ./tools/fwprep.py build/jade.bin build
    - ./tools/mkindex.py build $(basename $(ls build/*_fw.bin) | cut -d'_' -f1)
    - cp sdkconfig sdkconfig.defaults build/
    - cp components/esp32_bsdiff/bsdiff.* build/
  after_script:
    - mv build $CI_JOB_NAME
