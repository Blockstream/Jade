name: Build T-Deck

on:
  push:
    branches: [ '**' ]
  pull_request:
    branches: [ master ]

jobs:
  build:
    runs-on: ubuntu-latest
    container: espressif/idf:v5.5.4
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Build T-Deck firmware
        shell: bash
        run: |
          . /opt/esp/idf/export.sh
          cp configs/sdkconfig_display_tdeck.defaults sdkconfig.defaults
          idf.py -B build_tdeck set-target esp32s3
          idf.py -B build_tdeck build

      - name: Stage firmware artifacts
        run: |
          mkdir -p firmware-tdeck/bootloader firmware-tdeck/partition_table
          cp build_tdeck/bootloader/bootloader.bin firmware-tdeck/bootloader/
          cp build_tdeck/partition_table/partition-table.bin firmware-tdeck/partition_table/
          cp build_tdeck/ota_data_initial.bin firmware-tdeck/ 2>/dev/null || true
          cp build_tdeck/jade.bin firmware-tdeck/ 2>/dev/null || true
          cp build_tdeck/flasher_args.json firmware-tdeck/ 2>/dev/null || true
          echo "Firmware staged:"
          find firmware-tdeck -type f | sort

      - name: Upload firmware artifact
        uses: actions/upload-artifact@v4
        with:
          name: firmware-tdeck
          path: firmware-tdeck/
          retention-days: 90

  deploy:
    if: github.event_name == 'push'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download firmware artifact
        uses: actions/download-artifact@v4
        with:
          name: firmware-tdeck
          path: flasher/firmware/tdeck/

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: flasher/
          destination_dir: .
          keep_files: false
